# ─────────────────────────────────────────────
# tmux Configuration
# ThePrimeagen-inspired: prefix=C-a, vim nav, sessionizer
# ─────────────────────────────────────────────

# ── Prefix ──
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ── General ──
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 50000
set -g escape-time 0          # No delay for Esc (critical for vim)
set -g focus-events on        # Needed for vim autoread
set -g status-interval 5

# ── Windows (full-screen, not splits) ──
# Each project gets: window 1 = nvim, window 2 = claude
bind c new-window -c "#{pane_current_path}"

# Window switching: Cmd+1/2/3 in Ghostty sends C-a+number via keybind
# Also works with C-a then n/p (next/previous)

# ── Splits (if you ever need them) ──
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# ── Copy mode (vi keys) ──
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ── Sessionizer (C-a f to fuzzy-find projects and switch sessions) ──
bind f run-shell "tmux neww ~/.dotfiles/tmux/tmux-sessionizer"

# ── Quick session switching ──
bind -r ( switch-client -p
bind -r ) switch-client -n

# ── Reload config ──
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# ── Status bar (catppuccin-inspired) ──
set -g status-position top
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 40
set -g status-right-length 60
set -g status-left "#[fg=#1e1e2e,bg=#89b4fa,bold] #S #[fg=#89b4fa,bg=#1e1e2e] "
set -g status-right "#[fg=#585b70] %H:%M #[fg=#1e1e2e,bg=#a6e3a1,bold] #h "
set -g window-status-format "#[fg=#585b70] #I:#W "
set -g window-status-current-format "#[fg=#1e1e2e,bg=#cba6f7,bold] #I:#W "
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g message-style "bg=#313244,fg=#cdd6f4"
